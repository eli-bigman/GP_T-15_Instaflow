services:
  postgres-app:
    image: postgres:16-alpine
    container_name: insightflow-app-db
    environment:
      POSTGRES_DB: insightflow_app
      POSTGRES_USER: insightflow
      POSTGRES_PASSWORD: insightflow_pass
    ports:
      - "5432:5432"
    volumes:
      - pgdata-app:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U insightflow -d insightflow_app"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-warehouse:
    image: postgres:16-alpine
    container_name: insightflow-warehouse-db
    environment:
      POSTGRES_DB: insightflow_warehouse
      POSTGRES_USER: insightflow_wh
      POSTGRES_PASSWORD: insightflow_wh_pass
    ports:
      - "5433:5432"
    volumes:
      - pgdata-warehouse:/var/lib/postgresql/data
      - ./data-engineering/warehouse/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test:
        ["CMD-SHELL", "pg_isready -U insightflow_wh -d insightflow_warehouse"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: insightflow-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-app:5432/insightflow_app
      SPRING_DATASOURCE_USERNAME: insightflow
      SPRING_DATASOURCE_PASSWORD: insightflow_pass
    depends_on:
      postgres-app:
        condition: service_healthy

volumes:
  pgdata-app:
  pgdata-warehouse:
