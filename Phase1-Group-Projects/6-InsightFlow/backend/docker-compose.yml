
services:
  db:
    image: gdakore/insightflow-db:latest
    container_name: insightflow-db
    env_file:
      - .env.docker
    environment:
      POSTGRES_USER: ${APP_DB_USER}
      POSTGRES_PASSWORD: ${APP_DB_PASSWORD}
      POSTGRES_DB: insightflow_app
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql # Comment or remove this if you decide to use /var/lib/postgresql/data
#      - postgres_data:/var/lib/postgresql/data  # Use this if you're still using old installation of docker
    networks:
      - insightflow-network

  pgadmin:
    image: dpage/pgadmin4
    container_name: insightflow-pgadmin
    env_file:
      - .env.docker
    environment:
      PGADMIN_DEFAULT_EMAIL: ${APP_PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${APP_PGADMIN_PASSWORD}
    ports:
      - "5050:80"
    depends_on:
      - db
    networks:
      - insightflow-network

  app:
    build: .
    container_name: insightflow-app
    env_file:
      - .env.docker
    ports:
      - "8080:8080"
    depends_on:
      - db
    networks:
      - insightflow-network

volumes:
  postgres_data:

networks:
  insightflow-network:
    driver: bridge