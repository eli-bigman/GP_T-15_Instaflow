spring.config.import=optional:file:.env[.properties]

# Datasource
spring.datasource.url=${APP_DB_URL}
spring.datasource.username=${APP_DB_USER}
spring.datasource.password=${APP_DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Multipart
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# SQL Init
spring.sql.init.mode=always
spring.sql.init.data-locations=classpath:data.sql

# Server
server.port=8080

# JWT
app.jwt.secret=${APP_JWT_SECRET}
               
app.jwt.expiration-ms=${APP_ACCESS_TOKEN_EXPIRATION}

# Upload
app.upload.directory=./uploads

# SpringDoc / Swagger
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.operations-sorter=method


# Logging
logging.level.org.springframework=INFO

# Use this for full debugging
#debug=true
#logging.level.org.springframework=DEBUG

# External Server URLs
app.external.server.orders.url=https://sses-o3qy.onrender.com/api/orders
app.external.server.feedback.url=https://sses-o3qy.onrender.com/api/feedback
app.external.server.products.url=https://sses-o3qy.onrender.com/api/products