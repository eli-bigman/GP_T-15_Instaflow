spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/insightflow_app
    username: insightflow
    password: insightflow_pass
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    defer-datasource-initialization: true
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  sql:
    init:
      mode: always
      data-locations: classpath:data.sql

server:
  port: 8080

app:
  jwt:
    secret: Y2hhbmdlLXRoaXMtaW4tcHJvZHVjdGlvbi1pbnNpZ2h0Zmxvdy1zZWNyZXQta2V5LTEyMzQ1Njc4OQ==
    expiration-ms: 86400000
  upload:
    directory: ./uploads

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: method
