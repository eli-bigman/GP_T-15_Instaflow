name: CI Pipeline
permissions:
  id-token: write
  contents: read

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:latest
        env:
          POSTGRES_DB: insightflow_app
          POSTGRES_USER: insightflow
          POSTGRES_PASSWORD: insightflow_pass
        ports: ["5432:5432"]
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version: "25"
          cache: "maven"
          cache-dependency-path: backend/pom.xml
      - run: mvn clean package -DskipTests
        working-directory: ./backend
      - run: mvn test
        working-directory: ./backend
        env:
          APP_DB_URL: jdbc:postgresql://localhost:5432/insightflow_app
          APP_DB_USER: insightflow
          APP_DB_PASSWORD: insightflow_pass
          APP_JWT_SECRET: dGVzdF9zZWNyZXRfa2V5X2Zvcl9naXRodWJfYWN0aW9uc190ZXN0aW5nX29ubHk=
          APP_ACCESS_TOKEN_EXPIRATION: 86400000
