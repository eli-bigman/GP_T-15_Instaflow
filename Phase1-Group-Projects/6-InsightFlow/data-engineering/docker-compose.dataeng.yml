x-airflow-common: &airflow-common
  build: ./docker/airflow
  environment:
    &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__CORE__FERNET_KEY: "${AIRFLOW__CORE__FERNET_KEY}"
    # Shared JWT signing key — must be identical on all Airflow components so
    # Task SDK workers can authenticate against the execution API on the webserver.
    AIRFLOW__API_AUTH__JWT_SECRET: "${AIRFLOW__API_AUTH__JWT_SECRET}"
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "false"
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres-airflow/${POSTGRES_DB}
    # SimpleAuthManager is the default in Airflow 3.x (FAB is no longer default)
    AIRFLOW__CORE__SIMPLE_AUTH_MANAGER_USERS: "${_AIRFLOW_WWW_USER_USERNAME}:admin"
    AIRFLOW__CORE__SIMPLE_AUTH_MANAGER_PASSWORDS_FILE: "/opt/airflow/simple_auth_manager_passwords.json.generated"
    AIRFLOW__SCHEDULER__ENABLE_HEALTH_CHECK: "true"

    # StatsD Metrics
    # AIRFLOW__METRICS__STATSD_ON: "True"
    # AIRFLOW__METRICS__STATSD_HOST: "statsd-exporter"
    # AIRFLOW__METRICS__STATSD_PORT: "8125"
    # AIRFLOW__METRICS__STATSD_PREFIX: "airflow"

    # Airflow 3.x Task SDK — tasks on the scheduler need to reach the API server
    # over the Docker network, not localhost (which would look for port 8080 on
    # the scheduler container itself).
    AIRFLOW__CORE__EXECUTION_API_SERVER_URL: "http://airflow-webserver:8080/execution/"

    # Extended PYTHONPATH so LocalExecutor subprocesses can find all modules
    PYTHONPATH: /opt/airflow:/opt/airflow/dags:/opt/airflow/dags/utils:/opt/airflow/src

    # S3 credentials for DuckDB/MinIO access
    # S3_ENDPOINT: "${S3_ENDPOINT}"
    # S3_ACCESS_KEY: "${S3_ACCESS_KEY}"
    # S3_SECRET_KEY: "${S3_SECRET_KEY}"

    POSTGRES_HOST: postgres-airflow
    POSTGRES_PORT: "5432"
    POSTGRES_DB: "${POSTGRES_DB}"
    POSTGRES_USER: "${POSTGRES_USER}"
    POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"

  volumes:
    - ./airflow/dags:/opt/airflow/dags
    - ./airflow/logs:/opt/airflow/logs
    - ./src:/opt/airflow/src
    - ./config:/opt/airflow/config
    # - ./soda:/opt/airflow/soda
  user: "${AIRFLOW_UID:-50000}:0"
  networks:
    - airflow-network
    - insightflow-network 
  depends_on: &airflow-common-depends-on
    postgres-airflow:
      condition: service_healthy
    postgres-silver:          
      condition: service_healthy
    postgres-gold:           
      condition: service_healthy

services:
  # ==================== DATA INFRASTRUCTURE ====================

  postgres-airflow:
    image: postgres:16
    container_name: postgres-airflow
    environment:
      POSTGRES_USER: "${POSTGRES_USER}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
      POSTGRES_DB: "${POSTGRES_DB}"
    ports:
      - "5433:5432"
    volumes:
      - airflow-db-volume:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER}"]
      interval: 10s
      retries: 5
      start_period: 5s
    restart: always
    networks:
      - airflow-network
      - insightflow-network


  postgres-silver:
    image: postgres:16
    container_name: postgres-silver
    environment:
      POSTGRES_USER: "${POSTGRES_USER}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
      POSTGRES_DB: silver_db
    ports:
      - "5434:5432"
    volumes:
      - silver-db-volume:/var/lib/postgresql/data
      - ./docker/postgres/silver_init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER}"]
      interval: 10s
      retries: 5
      start_period: 5s
    restart: always
    networks:
      - airflow-network
      - insightflow-network

  postgres-gold:
    image: postgres:16
    container_name: postgres-gold
    environment:
      POSTGRES_USER: "${POSTGRES_USER}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
      POSTGRES_DB: gold_db
    ports:
      - "5435:5432"
    volumes:
      - gold-db-volume:/var/lib/postgresql/data
      - ./docker/postgres/gold_init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER}"]
      interval: 10s
      retries: 5
      start_period: 5s
    restart: always
    networks:
      - airflow-network
      - insightflow-network

