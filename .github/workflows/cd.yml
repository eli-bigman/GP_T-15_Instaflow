name: CD Pipeline
permissions:
  id-token: write
  contents: read

on:
  workflow_run:
    workflows: ["CI Pipeline"]
    types: [completed]
    branches: [main, dev]
  workflow_dispatch:

jobs:
  deploy:
    if: |
      (github.event_name == 'workflow_dispatch') ||
      (github.event.workflow_run.conclusion == 'success' && (github.event.workflow_run.head_branch == 'main' || github.event.workflow_run.head_branch == 'dev'))
    runs-on: ubuntu-latest
    environment: Insightflow_env

    steps:
      - uses: actions/checkout@v5

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./Phase1-Group-Projects/6-InsightFlow/backend
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/insightflow-backend:latest,${{ secrets.DOCKER_USERNAME }}/insightflow-backend:${{ github.sha }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./Phase1-Group-Projects/6-InsightFlow/frontend
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/insightflow-frontend:latest,${{ secrets.DOCKER_USERNAME }}/insightflow-frontend:${{ github.sha }}

      - name: Test deployment with docker compose
        env:
          APP_DB_USER: ${{secrets.APP_DB_USER}}
          APP_DB_PASSWORD: ${{ secrets.APP_DB_PASSWORD }}
          APP_JWT_SECRET: ${{ secrets.APP_JWT_SECRET }}
          APP_ACCESS_TOKEN_EXPIRATION: ${{secrets.APP_ACCESS_TOKEN_EXPIRATION}}
          APP_REFRESH_TOKEN_EXPIRATION: ${{ secrets.APP_REFRESH_TOKEN_EXPIRATION }}
          FRONTEND_COOKIE_NAME: ${{ secrets.FRONTEND_COOKIE_NAME }}
          FRONTEND_COOKIE_KEY: ${{ secrets.FRONTEND_COOKIE_KEY }}
          FRONTEND_COOKIE_EXPIRY_DAYS: ${{ secrets.FRONTEND_COOKIE_EXPIRY_DAYS }}
          BACKEND_URL: http://backend:8080
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
        run: |
          cd Phase1-Group-Projects/6-InsightFlow
          docker compose up -d
          echo "Waiting for services to start..."
          sleep 30

          echo "=== Container Status ==="
          docker compose ps

          echo "=== Testing Backend Health ==="
          curl -f http://localhost:8080/actuator/health || echo "Backend health check failed"

          echo "=== Testing Frontend ==="
          curl -f http://localhost:8501 || echo "Frontend check failed"

          docker compose down
